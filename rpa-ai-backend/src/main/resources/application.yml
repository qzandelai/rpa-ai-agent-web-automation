server:
  port: 8080
  servlet:
    context-path: /rpa-ai

spring:
  application:
    name: rpa-ai-agent
  profiles:
    active: dev
  websocket:
    enabled: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rpa_ai?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  data:
    mongodb:
      uri: mongodb://localhost:27017/rpa_ai_logs
    # ❌ 删除这里的 neo4j 配置，移到外面
    # neo4j:
    #   uri: ...

  # ✅ 新版 Neo4j 配置（与 data 同级）
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: rpaai123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# 任务调度配置
rpa:
  scheduler:
    max-concurrent-tasks: 5
    task-timeout-minutes: 30
    cleanup-interval-minutes: 5
  browser:
    heartbeat-timeout-seconds: 60
  ai:
    llm:
      provider: dashscope
      api-key:
      model: qwen-plus

logging:
  level:
    com.rpaai: DEBUG
    org.springframework.data.neo4j: DEBUG  # 添加Neo4j调试日志
    org.neo4j.driver: DEBUG